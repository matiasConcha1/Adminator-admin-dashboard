<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Iniciar sesion</title>
    <style>
      #loader {
        transition: all 0.3s ease-in-out;
        opacity: 1;
        visibility: visible;
        position: fixed;
        height: 100vh;
        width: 100%;
        background: #fff;
        z-index: 90000;
      }

      #loader.fadeOut {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 40px;
        height: 40px;
        position: absolute;
        top: calc(50% - 20px);
        left: calc(50% - 20px);
        background-color: #333;
        border-radius: 100%;
        -webkit-animation: sk-scaleout 1s infinite ease-in-out;
        animation: sk-scaleout 1s infinite ease-in-out;
      }

      @-webkit-keyframes sk-scaleout {
        0% { -webkit-transform: scale(0) }
        100% {
          -webkit-transform: scale(1);
          opacity: 0;
        }
      }

      @keyframes sk-scaleout {
        0% {
          -webkit-transform: scale(0);
          transform: scale(0);
        }
        100% {
          -webkit-transform: scale(1);
          transform: scale(1);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body class="app">
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <script>
      window.addEventListener('load', function load() {
        const loader = document.getElementById('loader');
        setTimeout(function() {
          loader.classList.add('fadeOut');
        }, 300);
      });

      document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('[data-login-form]');
        const feedback = document.querySelector('[data-login-feedback]');
        const usernameField = form ? form.querySelector('[name="username"]') : null;
        const passwordField = form ? form.querySelector('[name="password"]') : null;
        const pendingSignupRaw = window.sessionStorage.getItem('adminator.pendingSignup');
        const signupMessage = window.sessionStorage.getItem('adminator.signupMessage');
        const defaultUser = {
          name: 'Valentina Soto',
          email: 'valentina.soto@administrador.local',
          role: 'Directora de Operaciones',
          phone: '+56 9 8123 4567',
          location: 'Santiago, Chile',
          department: 'Operaciones y Analitica',
          summary: 'Lidera la operacion diaria, coordina equipos y mantiene visibilidad ejecutiva sobre indicadores clave.',
          avatar: 'https://randomuser.me/api/portraits/women/44.jpg'
        };

        function showFeedback(message, type) {
          if (!feedback) return;
          feedback.textContent = message;
          feedback.classList.remove('d-n', 'alert-primary', 'alert-success', 'alert-danger');
          feedback.classList.add(type || 'alert-primary');
        }

        let pendingSignup = null;
        try {
          pendingSignup = pendingSignupRaw ? JSON.parse(pendingSignupRaw) : null;
        } catch (error) {
          pendingSignup = null;
        }

        if (pendingSignup && usernameField && !usernameField.value) {
          usernameField.value = pendingSignup.name || '';
        }

        if (signupMessage) {
          showFeedback(signupMessage, 'alert-success');
          window.sessionStorage.removeItem('adminator.signupMessage');
        }

        document.querySelectorAll('[data-password-toggle]').forEach(function(toggle) {
          toggle.addEventListener('click', function() {
            const wrapper = toggle.closest('.password-field');
            const input = wrapper ? wrapper.querySelector('input') : null;
            const icon = toggle.querySelector('i');
            if (!input || !icon) return;

            const showPassword = input.type === 'password';
            input.type = showPassword ? 'text' : 'password';
            toggle.setAttribute('aria-pressed', showPassword ? 'true' : 'false');
            toggle.setAttribute('aria-label', showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena');
            icon.className = showPassword ? 'ti-eye-off' : 'ti-eye';
          });
        });

        if (form) {
          form.addEventListener('submit', function(event) {
            event.preventDefault();

            const username = usernameField ? usernameField.value.trim() : '';
            const password = passwordField ? passwordField.value : '';

            if (!username || !password) {
              showFeedback('Completa usuario y contrasena para continuar.', 'alert-danger');
              window.alert('Completa usuario y contrasena para continuar.');
              return;
            }

            const normalizedUsername = username.toLowerCase();

            if (
              pendingSignup &&
              pendingSignup.name &&
              pendingSignup.name.toLowerCase() === normalizedUsername &&
              pendingSignup.password !== password
            ) {
              showFeedback('La contrasena no coincide con la cuenta registrada.', 'alert-danger');
              window.alert('La contrasena no coincide con la cuenta registrada.');
              return;
            }

            const user = {
              name: pendingSignup && pendingSignup.name && pendingSignup.name.toLowerCase() === normalizedUsername ? pendingSignup.name : username,
              username: pendingSignup && pendingSignup.name && pendingSignup.name.toLowerCase() === normalizedUsername ? pendingSignup.name : username,
              email: pendingSignup && pendingSignup.name && pendingSignup.name.toLowerCase() === normalizedUsername ? pendingSignup.email : defaultUser.email,
              role: defaultUser.role,
              phone: defaultUser.phone,
              location: defaultUser.location,
              department: defaultUser.department,
              summary: defaultUser.summary,
              avatar: defaultUser.avatar
            };

            window.localStorage.setItem('adminator.session', JSON.stringify({
              isAuthenticated: true,
              user: user,
              loggedAt: new Date().toISOString()
            }));

            if (pendingSignup && pendingSignup.name && pendingSignup.name.toLowerCase() === normalizedUsername) {
              window.sessionStorage.removeItem('adminator.pendingSignup');
            }

            showFeedback('Acceso correcto. Redirigiendo al panel...', 'alert-success');
            window.setTimeout(function() {
              window.location.href = 'index.html';
            }, 250);
          });
        }
      });
    </script>

    <div class="peers ai-s fxw-nw h-100vh">
      <div class="d-n@sm- peer peer-greed h-100 pos-r bgr-n bgpX-c bgpY-c bgsz-cv" style='background-image: url("assets/static/images/bg.jpg")'>
        <div class="pos-a centerXY">
          <div class="bgc-white bdrs-50p pos-r" style="width: 120px; height: 120px;">
            <img class="pos-a centerXY logo-auth" src="assets/static/images/logo.svg" alt="" style="max-width: 60px; max-height: 60px;">
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4 peer pX-40 pY-80 h-100 bgc-white scrollable pos-r" style="min-width: 320px;">
        <h4 class="fw-300 c-grey-900 mB-40">Iniciar sesion</h4>
        <form data-login-form>
          <div class="mb-3">
            <label class="text-normal text-dark form-label">Usuario</label>
            <input name="username" type="text" class="form-control" placeholder="Ingresa tu usuario">
          </div>
          <div class="mb-3">
            <label class="text-normal text-dark form-label">Contrasena</label>
            <div class="password-field">
              <input name="password" type="password" class="form-control" placeholder="Ingresa tu contrasena">
              <button type="button" class="password-toggle-btn" data-password-toggle="true" aria-label="Mostrar contrasena" aria-pressed="false">
                <i class="ti-eye"></i>
              </button>
            </div>
          </div>
          <div class="mb-3">
            <div class="checkbox checkbox-circle checkbox-info peers ai-c">
              <input type="checkbox" id="inputRememberSignin" name="inputRememberSignin" class="peer" checked>
              <label for="inputRememberSignin" class="peers peer-greed js-sb ai-c form-label">
                <span class="peer peer-greed">Recordarme</span>
              </label>
            </div>
          </div>
          <div class="alert alert-primary d-n" data-login-feedback role="alert"></div>
          <div class="peers ai-c jc-sb fxw-nw">
            <div class="peer">
              <a href="signup.html" class="c-blue-500 td-n">Crear cuenta</a>
            </div>
            <div class="peer">
              <button type="submit" class="btn btn-primary btn-color">Iniciar sesion</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
